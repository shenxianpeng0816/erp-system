spring:
  datasource:
    url: jdbc:mysql://localhost:3306/erp_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: shenxianpeng
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.erp.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      # 注意：不在全局配置逻辑删除，避免影响没有 status 字段的实体
      # 逻辑删除在 User / Customer / Product 实体上用 @TableLogic 单独标注

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: erp-system-jwt-secret-key-2024-change-in-production
  expiration: 86400000   # 24 hours in ms

logging:
  level:
    com.erp: debug
